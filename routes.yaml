apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-ingress
  namespace: argocd
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`argocd.everestsummitpm.com`)
    kind: Rule
    services:
    - name: argocd-server
      namespace: argocd
      port: 80
    middlewares:
    - name: internal-ips
      namespace: traefik
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-ingress
  namespace: monitoring
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`prometheus.everestsummitpm.com`)
    kind: Rule
    services:
    - name: prometheus-server
      port: 80
    middlewares:
    - name: internal-ips
      namespace: traefik
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kickstart-ingress
  namespace: kickstart
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`kickstart.everestsummitpm.com`)
    kind: Rule
    services:
    - name: kickstart
      port: 80
