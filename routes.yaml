apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keel-ingress
  namespace: keel
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`keel.everestsummitpm.com`)
    kind: Rule
    services:
    - name: keel
      port: 9300
    middlewares:
    - name: internal-ips
      namespace: traefik
  - match: Host(`keel.everestsummitpm.com`) && PathPrefix(`/v1/webhooks`)
    kind: Rule
    services:
    - name: keel
      port: 9300
