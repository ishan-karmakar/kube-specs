apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-ingress
  namespace: argocd
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`argocd.everestsummitpm.com`)
    kind: Rule
    services:
    - name: argocd-server
      namespace: argocd
      port: 80
    middlewares:
    - name: internal-ips
      namespace: traefik
---
